<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Scrapbook</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="sparkles"></div>

<!-- CLOSED BOOK -->
<div id="bookContainer">

    <div id="book">

        <!-- FRONT COVER -->
        <div id="coverFront">
            <div class="gold-title">
                Our Story
            </div>
        </div>

        <!-- INSIDE PAGE -->
        <div id="insidePage">

            <div id="passwordPage">

                <h1>Welcome My Baby ❤️</h1>

                <p>
                    Enter the password to open our scrapbook
                </p>

                <input
                    type="password"
                    id="passwordInput"
                    placeholder="Password"
                >

                <button id="unlockBtn">
                    Unlock
                </button>

                <p id="errorMsg"></p>

            </div>

        </div>

    </div>

</div>

<script src="pages/memories.js"></script>
<script src="script.js"></script>

</body>
</html>
